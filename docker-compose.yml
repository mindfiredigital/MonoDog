services:
  monodog:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    env_file:
      - ${MONODOG_BACKEND_ENV_FILE:-packages/backend/.env}
      - ${MONODOG_ENV_FILE:-.env.docker}
    ports:
      - '${MONODOG_PUBLIC_DASHBOARD_PORT:-3010}:${MONODOG_DASHBOARD_PORT:-3010}'
      - '${MONODOG_PUBLIC_API_PORT:-4000}:${MONODOG_SERVER_PORT:-4000}'
    volumes:
      - ${MONODOG_DATA_MOUNT:-monodog-data:/app/data}
    restart: unless-stopped

volumes:
  monodog-data:
